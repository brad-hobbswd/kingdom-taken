<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
404 | Lost In The City
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg-main:#0c1015;
--bg-alt:#151b22;

--charcoal:#1d242d;

--gold:#d8ae6a;

--gold-dark:#b88646;

--light:#f3ede4;

--soft:#c4c0ba;

--border:
rgba(255,255,255,.08);

}

body{

font-family:Georgia,serif;

background:
linear-gradient(
180deg,
#081018,
#0c1015
);

color:
var(--light);

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:25px;

}

.error-box{

max-width:900px;

width:100%;

padding:70px
50px;

text-align:center;

background:
linear-gradient(
180deg,
rgba(29,36,45,.65),
rgba(21,27,34,.95)
);

border:
1px solid
var(--border);

border-radius:35px;

box-shadow:
0 20px 70px
rgba(0,0,0,.55);

position:relative;

overflow:hidden;

}

.error-box:before{

content:"";

position:absolute;

top:0;

left:0;

width:100%;

height:4px;

background:
linear-gradient(
90deg,
transparent,
var(--gold),
transparent
);

}

.error-number{

font-size:
clamp(
5rem,
12vw,
9rem
);

line-height:1;

color:
var(--gold);

margin-bottom:20px;

font-weight:bold;

}

h1{

font-size:
clamp(
2rem,
4vw,
3rem
);

margin-bottom:25px;

}

p{

max-width:650px;

margin:auto;

line-height:2;

color:
var(--soft);

margin-bottom:40px;

}

.button-row{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.button{

padding:
15px
32px;

background:
var(--gold);

border-radius:40px;

color:black;

font-weight:bold;

text-decoration:none;

transition:.4s;

}

.button:hover{

background:
var(--gold-dark);

transform:
translateY(-5px);

}

.small-text{

margin-top:45px;

font-style:italic;

color:
var(--soft);

opacity:.7;

}

</style>

</head>

<body>

<div class="error-box">

<div class="error-number">

404

</div>

<h1>

Wrong Turn Through The City

</h1>

<p>

Something led this path into unfamiliar streets. The page you followed could not be found. Even watchmen sometimes discover abandoned places and broken routes.

</p>

<div class="button-row">

<a
href="index.html"
class="button">

Return Home

</a>

<a
href="contents.html"
class="button">

View Contents

</a>

</div>

<div class="small-text">

"Heaven still moves through modern streets."

</div>

</div>

</body>
</html>
